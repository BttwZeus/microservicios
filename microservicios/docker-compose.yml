services:
  servicio_a:
    build: ./servicio_a
    container_name: servicio_a_aguirre
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db-tarea-ia.c3oshhympms4.us-east-1.rds.amazonaws.com
      - DB_USER=admin
      - DB_PASSWORD=12345678
      - DB_NAME=db_aguirre
    networks:
      - red_interna_aguirre

  servicio_b:
    build: ./servicio_b
    container_name: servicio_b_aguirre
    environment:
      - DB_HOST=db-tarea-ia.c3oshhympms4.us-east-1.rds.amazonaws.com
      - DB_USER=admin
      - DB_PASSWORD=12345678
      - DB_NAME=db_aguirre
    networks:
      - red_interna_aguirre

networks:
  red_interna_aguirre:
    driver: bridge
